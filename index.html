<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ventas Tecnología</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f3f3f3;
    }

    header {
      background: linear-gradient(90deg, #0f7b47, #1da65d);
      color: white;
      text-align: center;
      padding: 25px;
    }

    .contenedor {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      background: #ddd;
    }

    .card-body {
      padding: 15px;
    }

    .precio {
      color: #1da65d;
      font-size: 22px;
      font-weight: bold;
    }

    .estado {
      display: inline-block;
      margin-top: 5px;
      padding: 5px 10px;
      border-radius: 10px;
      background: #e0f5e8;
      color: #1da65d;
      font-size: 14px;
    }

    .acciones {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-interesa {
      background: #1da65d;
      color: white;
    }

    .btn-oferta {
      background: #ddd;
    }
  </style>
</head>

<body>

<header>
  💻 Reparación de PC  
  <br><br>
  Presupuesto sin cargo  
  <br>
  Limpieza desde $20.000
</header>

<div class="contenedor" id="productos"></div>

<script>
function formatearPrecio(num) {
  return Number(num).toLocaleString("es-AR");
}

function enviarWhatsApp(nombre, precio, estado, tipo = "consulta") {
  const mensaje = tipo === "oferta"
    ? `Hola, quiero hacer una oferta por: ${nombre} ($${precio})`
    : `Hola, me interesa: ${nombre} ($${precio})`;

  const url = "https://wa.me/?text=" + encodeURIComponent(mensaje);
  window.open(url, "_blank");
}

fetch("productos.csv")
  .then(res => res.text())
  .then(texto => {

    const lineas = texto.trim().split("\n");
    const contenedor = document.getElementById("productos");

    lineas.forEach(linea => {

      const [nombre, precio, estado, imagen] = linea.split(",").map(x => x.trim());

      console.log("Imagen:", imagen);

      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");

      // 🔥 ESTA ES LA CLAVE (funciona seguro en GitHub)
      img.src = new URL(imagen, window.location.href).href;

      img.alt = nombre;

      img.onerror = function () {
        console.log("Error cargando imagen:", this.src);
        this.src = "https://via.placeholder.com/400x250?text=Sin+imagen";
      };

      const body = document.createElement("div");
      body.className = "card-body";

      body.innerHTML = `
        <h3>${nombre}</h3>
        <div class="precio">$${formatearPrecio(precio)}</div>
        <div class="estado">${estado}</div>

        <div class="acciones">
          <button class="btn-interesa">Me interesa</button>
          <button class="btn-oferta">Oferta</button>
        </div>
      `;

      card.appendChild(img);
      card.appendChild(body);

      body.querySelector(".btn-interesa").onclick = () => {
        enviarWhatsApp(nombre, precio, estado);
      };

      body.querySelector(".btn-oferta").onclick = () => {
        enviarWhatsApp(nombre, precio, estado, "oferta");
      };

      contenedor.appendChild(card);

    });

  })
  .catch(err => {
    console.error("Error cargando CSV:", err);
  });
</script>

</body>
</html>
